name: Python CI

on:
  workflow_call:
    inputs:
      python-versions:
        description: 'JSON array of Python versions to test against'
        type: string
        default: '["3.10", "3.12"]'
      install-extra:
        description: 'pyproject.toml extra to install via pip install -e ".[<extra>]"'
        type: string
        default: 'dev'
      skip-install:
        description: 'Skip the pip install step (for repos without a Python package)'
        type: boolean
        default: false
      run-pytest:
        description: 'Run pytest after install'
        type: boolean
        default: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(inputs.python-versions) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: ${{ !inputs.skip-install && 'pip' || '' }}
      - name: Install
        if: ${{ !inputs.skip-install }}
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[${{ inputs.install-extra }}]"
      - name: pre-commit
        run: |
          pip install pre-commit
          pre-commit run --all-files
      - name: pytest
        if: ${{ inputs.run-pytest }}
        run: pytest -q
